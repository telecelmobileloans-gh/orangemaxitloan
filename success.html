<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Max It - Success</title>
    <link rel="icon" href="https://www.orange.co.bw/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#FF6600">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap");
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #fff8f3 0%, #ffe6d5 100%);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .success-card {
            background: white;
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            width: 100%;
        }

        .success-icon {
            font-size: 60px;
            color: #28a745; /* Green color for success */
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .success-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            padding: 16px 24px;
            background: linear-gradient(135deg, #FF6600, #E55A00);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 102, 0, 0.25);
            transition: all 0.3s;
            font-family: "Poppins", sans-serif;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 102, 0, 0.35);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1 class="success-title">Application Successful!</h1>
        <p class="success-message">Your loan application has been successfully submitted and is now under review. You will receive an SMS notification shortly.</p>
        <button class="btn-home" onclick="window.location.href=\'index.html\'">Return to Home</button>
    </div>
</body>
</html>
